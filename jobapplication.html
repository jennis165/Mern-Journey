<!DOCTYPE html>
<html>
    <head>
        <title>Job Application Form</title>
    </head>
    <body>
        <h1>Job Application</h1>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter Name...">
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter Email id...">
            <br><br>
            <label for="number">Phone:</label>
            <input type="tel" id="number" placeholder="Enter Number...">
            <br><br>
            <label for="upload">Resume:</label><br><br>
            <input type="file" id="upload" name="upload">
            <br><br>
            <label for="exp">Experience(years):</label>
            <input type="number" id="exp">
         <fieldset>
                <legend>Skills:</legend>
                <input type="checkbox"  id="html"><br>
                <label for="html">HTML</label>
                <br><br>
                <input type="checkbox"  id="css"><br>
                <label for="css">CSS</label>
                <br><br>
                <input type="checkbox" id="javascript">
                <br>
                <label for="javascript">JavaScript</label>

        </fieldset>
        <br><br>
        <label for="select">Highest Education:</label>
        <br><br>
        <select name="education" id="select">
            <option>High School</option>
            <option>University</option>
            <option>Diploma</option>
           
        </select>
         <br><br> 
        <p>Availability:</p>  
        <input type="radio" id="full-time" name="availability" value="full-time"> <br>
        <lable for="full-time">Full-time</lable>
        <br><br>
        <input type="radio" id="par-time" name="availability" value="part-time"> <br>
        <label for="part-time">Part-time</label>

    <br>
    <br>
        <label for="comments">Additional Comments:</label>
        <br>
        <textarea name="textarea" rows="20" cols="30" placeholder="Tell us..."></textarea> 
        <br><input type="submit">

        
        
        
        


           
        </form>
    </body>
</html>
