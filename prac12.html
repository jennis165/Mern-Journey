<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>FlexBox</title>
        <style>
            .container{
                background-color: beige;
                border: 2px solid black;
                width: 100%;
                height: 500px;
                display: flex;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                
}       
            #box1{
               border: 2px solid black;
                width: 100px;
                height: 100px;
                margin: 5px;
                background-color: blue;
                order: 500; 
                flex-grow: 100;
                
            }
            #box2{
                 border: 2px solid black;
                width: 100px;
                height: 100px;
                margin: 5px;
                background-color: red;
                order: 400;
                flex-shrink: 5000;
                align-self: flex-end;
            }
            #box3{
                border: 2px solid black;
                height: 100px;
                width: 100px;
                margin: 5px;
                background-color: aquamarine;
                order: 300;
                flex-basis: 200px;
                
                
            }
            #box4{
                 border: 2px solid black;
                height: 100px;
                width: 100px;
                margin: 5px;
                background-color: orange;
                order: 200;
                align-self: flex-start;
                
                
            }
        </style>
    </head>
    <body>

        <div class="container">
            <div class="box" id="box1">Box1</div>
            <div class="box" id="box2">Box2</div>
            <div class="box" id="box3">Box3</div>
            <div class="box" id="box4">Box4</div>
            <br>
       
</div>
    </body>
</html>
