        <p>Today we will learn about forms...</p>
            <form>

            </form>

            <br>
            <p>Now we will learn few form date type</p>
            <br>
            
             <form>
            <label for="datepicker">Enter Date</label>
            <input type="date" id="datepicker">
            <br>
            <br>

            <label for="name">Enter Name:</label>
            <input type="text" id="name">

            <br>

            <br>
            <label for="tick">select</label>
                <input type="radio" id="tick">

            <label for="checkbox">Check</label>
            <input type="check" id="checkbox">
         </form>

        <br>
        <br>
        
        <p>Now we will learn some form element</p>
        <p>Select=Dropdown</p>

        <form>

        <label for="selector">Choose Your Fav Dishes</label>
         <select name="dishes" id="selector">
        <option>Maggi</option>
        <option>Pasta</option>
         <option>Pizza</option>
        </select>
        <br>
        <br>
        <p>Tell about your self:</p>
        <textarea name="textarea" id="text" cols="30" rows="20" placeholder="Enter Your Description"></textarea>

        </form>
        <br>
        <p>button</p>
        
        <button>Submit</button>
        <br>
        <br>
        <fieldset>
            <legend>form element</legend>
            <form>
                <label for="name">Enter Your Name:</label>
                <input type="text" id="name">
                <br>
                <br>
                <label for="number">Enter Your Number:</label>
                
                <input type="text" id="number">
            </form>
        </fieldset>
