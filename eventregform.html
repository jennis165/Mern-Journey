<!DOCTYPE html>
<html>
    <head>
        <title>Event Registration</title>
     </head>
        <body>
            <form>
              
                <fieldset>
                    <legend>Event Registration</legend>
                    <Label for="name">Name:</Label>
                    <input type="text" id="name" placeholder="Enter Your Name..." required>
                    <br> <br>
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Enter Email ID...">
                    <br> <br>
                    <label for="number">Phone Number:</label>
                    <input type="tel" id="number" placeholder="Enter Phone Number...">
                    <br><br>
                <label for="selector">Occupation:</label>
                <select name="occupation" id="selector">
                    <option>Student</option>
                    <option>Private </option>
                    <option>Government</option>
                </select>
                <br><br>
                <p>Topic of Interest:</p>
                <br>
                <input type="checkbox" id="html">
                <label for="html">HTML</label>
                <br>
                <input type="checkbox" id="css">
                <label for="css">CSS</label>
                <br>
                  <input type="checkbox" id="java">
                <label for="java">JavaScript</label>
              
                <p>Comments:</p>
                <textarea name="textarea" rows="10" cols="30" placeholder="Comment..."></textarea>
                <br>
                <br>
                <input type="submit" value="Register">
        </fieldset>    
                
            </form>
        </body>
   
</html>
